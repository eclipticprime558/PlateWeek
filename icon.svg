<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0B040"/>
      <stop offset="100%" stop-color="#C05818"/>
    </linearGradient>
  </defs>
  <!-- App background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer plate ring -->
  <circle cx="256" cy="248" r="168" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="14"/>
  <circle cx="256" cy="248" r="134" fill="rgba(0,0,0,0.12)" stroke="rgba(0,0,0,0.15)" stroke-width="8"/>
  <!-- Fork (left) -->
  <g fill="white">
    <!-- tines -->
    <rect x="186" y="138" width="9" height="56" rx="4.5"/>
    <rect x="202" y="138" width="9" height="56" rx="4.5"/>
    <rect x="218" y="138" width="9" height="56" rx="4.5"/>
    <!-- neck connector -->
    <rect x="193" y="188" width="21" height="16" rx="3"/>
    <!-- handle -->
    <rect x="196" y="200" width="15" height="110" rx="7.5"/>
  </g>
  <!-- Knife (right) -->
  <g fill="white">
    <!-- blade (slight taper) -->
    <path d="M299 138 Q312 138 315 155 L315 200 Q312 205 299 205 Z"/>
    <rect x="299" y="138" width="16" height="175" rx="8"/>
  </g>
  <!-- "PW" brand mark at bottom -->
  <text x="256" y="430" text-anchor="middle" font-family="Georgia,serif" font-weight="700"
    font-size="52" fill="rgba(0,0,0,0.35)" letter-spacing="4">PLATEWEEK</text>
</svg>
